# MCP Guard — basic configuration example
version: 1

# Agent-facing transport (how the AI client connects to mcp-guard)
listen:
  transport: stdio  # "stdio" (default) or "http"
  # port: 31415     # Only used when transport is "http"
  # host: 0.0.0.0   # Only used when transport is "http"

# Upstream MCP servers to proxy
servers:
  # Local MCP server spawned as a child process
  - name: filesystem
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]

  # Remote MCP server via HTTP
  # - name: slack
  #   transport: http
  #   url: http://localhost:4000/mcp

# Policy rules
policy:
  # Deny by default — only explicitly allowed tools can be called
  defaultAction: deny

  rules:
    # Allow all read_* tools
    - tool: "read_*"
      allow: true

    # Allow search
    - tool: "search_files"
      allow: true

    # Allow GitHub read operations
    - tool: "github_get_*"
      allow: true

    # Block GitHub write operations
    - tool: "github_create_*"
      allow: false

    # Block all filesystem writes
    - tool: "write_file"
      allow: false

# Log level: debug | info | warn | error
logLevel: info
